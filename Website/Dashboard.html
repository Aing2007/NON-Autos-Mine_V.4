<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8" />
    <title>NON | คะแนนสรุปผล</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f0e8;
            --white: #ffffff;
            --ink: #2d2a26;
            --ink-soft: #6b6560;
            --red: #e54e2e;
            --orange: #f4a020;
            --teal: #4dbf8a;
            --purple: #7b6ee8;
            --col-human: #4a7fc1;
            --col-face: #e05252;
            --col-pose: #4abf80;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --border: #f0ebe2;
        }

        html, body {
            min-height: 100%;
            background: url('image/BG.png') no-repeat center center fixed;
            background-size: cover;
            background-color: var(--bg);
            font-family: 'Nunito', 'Sarabun', sans-serif;
            color: var(--ink);
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            height: 72px;
            background: var(--white);
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 24px;
        }

        .logo-avatar {
            width: 46px; height: 46px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: #f0ebe0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem;
            color: var(--ink-soft);
            text-align: center;
            line-height: 1.2;
            border: 2px solid #e0d9ce;
            cursor: pointer;
        }
        .logo-avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: 0.06em;
            color: var(--ink);
            text-transform: uppercase;
        }

        .ws-pills { display: flex; gap: 8px; }
        .ws-pill {
            display: flex; align-items: center; gap: 6px;
            border-radius: 99px;
            padding: 5px 14px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            border: 2px solid;
        }
        .pill-dot { width: 9px; height: 9px; border-radius: 50%; }
        .pill-human { border-color: #4a7fc155; color: var(--col-human); background: #4a7fc110; }
        .pill-face  { border-color: #e0525255; color: var(--col-face);  background: #e0525210; }
        .pill-pose  { border-color: #4abf8055; color: var(--col-pose);  background: #4abf8010; }

        .header-right {
            margin-left: auto;
            display: flex; align-items: center; gap: 14px;
        }

        .clock-pill {
            display: flex; align-items: center; gap: 7px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 99px;
            padding: 5px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
            background: var(--bg);
        }

        .home-btn {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: var(--bg);
            border: 2px solid rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            overflow: hidden;
            color: var(--ink-soft);
            font-size: 0.55rem;
            text-align: center;
            line-height: 1.3;
        }
        .home-btn:hover { background: #ebe4d8; }
        .home-btn img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== PAGE ===== */
        .page {
            position: relative; z-index: 1;
            padding: 40px 20px 80px;
            min-height: calc(100vh - 72px);
        }

        .page-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ===== PAGE TITLE ===== */
        .page-title-bar {
            margin-bottom: 28px;
            animation: card-in 0.4s cubic-bezier(.22,1,.36,1) both;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--purple);
            font-family: 'Nunito', sans-serif;
        }

        .page-subtitle {
            font-size: 0.92rem;
            color: var(--ink-soft);
            margin-top: 3px;
            font-family: 'Sarabun', sans-serif;
            font-weight: 600;
        }

        /* ===== META PILLS ===== */
        .meta-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .meta-pill {
            display: flex; align-items: center; gap: 6px;
            background: var(--white);
            border: 2px solid var(--border);
            border-radius: 99px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--ink-soft);
            font-family: 'Nunito', sans-serif;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        .meta-pill strong {
            color: var(--ink);
        }

        /* ===== STATS CARD ===== */
        .stats-card {
            background: var(--white);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 24px 28px;
            margin-bottom: 28px;
            animation: card-in 0.45s cubic-bezier(.22,1,.36,1) both;
            animation-delay: 0.05s;
        }

        .stats-card-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
            margin-bottom: 16px;
            font-family: 'Nunito', sans-serif;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .stat-item {
            background: var(--bg);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1.5px solid var(--border);
        }

        .stat-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .stat-icon.yellow { background: #fff3d4; }
        .stat-icon.green  { background: #d4f5e8; }
        .stat-icon.purple { background: #ede8ff; }
        .stat-icon.blue   { background: #dceeff; }

        .stat-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: 'Nunito', sans-serif;
        }

        .stat-value {
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--ink);
            font-family: 'Nunito', sans-serif;
            font-variant-numeric: tabular-nums;
            margin-top: 1px;
        }

        /* ===== SECTION HEADING ===== */
        .section-heading {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            margin-top: 8px;
        }

        .section-heading-bar {
            width: 5px; height: 26px;
            border-radius: 3px;
            background: linear-gradient(180deg, var(--purple), var(--teal));
            flex-shrink: 0;
        }

        .section-heading-text {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--ink);
            font-family: 'Nunito', sans-serif;
        }

        /* ===== SCORE CARDS GRID ===== */
        .score-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .score-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: card-in 0.5s cubic-bezier(.22,1,.36,1) both;
        }

        .score-card:nth-child(1) { animation-delay: 0.1s; }
        .score-card:nth-child(2) { animation-delay: 0.17s; }
        .score-card:nth-child(3) { animation-delay: 0.24s; }
        .score-card:nth-child(4) { animation-delay: 0.31s; }
        .score-card:nth-child(5) { animation-delay: 0.38s; }
        .score-card:nth-child(6) { animation-delay: 0.45s; }

        .score-card-top {
            padding: 20px 20px 16px;
            border-bottom: 1.5px solid var(--border);
        }

        .score-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .score-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: white;
            font-family: 'Nunito', sans-serif;
            flex-shrink: 0;
        }

        .score-card-name {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--ink);
            font-family: 'Nunito', sans-serif;
        }

        .score-card-id {
            font-size: 0.78rem;
            color: var(--ink-soft);
            font-family: 'Sarabun', sans-serif;
            margin-top: 1px;
        }

        .score-main-wrap {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .score-main {
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--purple);
            font-family: 'Nunito', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        .score-main-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: 'Nunito', sans-serif;
        }

        .score-card-body {
            padding: 16px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #faf7f2;
        }

        .breakdown-item {
            background: var(--white);
            border-radius: 12px;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
        }

        .breakdown-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .breakdown-label-text {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-family: 'Nunito', sans-serif;
        }

        .breakdown-score {
            font-size: 0.88rem;
            font-weight: 800;
            color: var(--ink);
            font-family: 'Nunito', sans-serif;
        }

        .breakdown-bar {
            height: 6px;
            background: rgba(0,0,0,0.06);
            border-radius: 3px;
            overflow: hidden;
        }

        .breakdown-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease-out;
        }

        .fill-purple { background: linear-gradient(90deg, var(--purple), #a094f0); }
        .fill-orange { background: linear-gradient(90deg, var(--orange), #f7c060); }
        .fill-teal   { background: linear-gradient(90deg, var(--teal),   #7fdbaf); }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            grid-column: 1 / -1;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 64px 32px;
            text-align: center;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .empty-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--ink);
            font-family: 'Nunito', sans-serif;
            margin-bottom: 6px;
        }

        .empty-desc {
            font-size: 0.9rem;
            color: var(--ink-soft);
            font-family: 'Sarabun', sans-serif;
        }

        /* ===== ACTION BUTTONS ===== */
        .action-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            padding-top: 8px;
        }

        .btn {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s;
            font-family: 'Nunito', sans-serif;
            white-space: nowrap;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: scale(0.99); }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple) 0%, #5a4dcf 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(123,110,232,0.35);
        }
        .btn-primary:hover { box-shadow: 0 10px 28px rgba(123,110,232,0.45); }

        .btn-secondary {
            background: var(--white);
            color: var(--ink);
            border: 2px solid var(--border);
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        }
        .btn-secondary:hover { background: #faf7f2; }

        .btn-danger {
            background: var(--white);
            color: var(--red);
            border: 2px solid #f8d0c8;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }
        .btn-danger:hover { background: #fff4f2; }

        /* ===== ANIMATIONS ===== */
        @keyframes card-in {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .page { padding: 24px 14px 64px; }
            .ws-pills { display: none; }
            .page-title { font-size: 1.5rem; }
            .score-cards-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo-avatar" title="Logo">
        <img src="image/logo.png" alt="NON Logo">
    </div>
    <div class="header-title">NON-Autos&nbsp;Mine</div>

    <div class="ws-pills">
        <div class="ws-pill pill-human">
            <span class="pill-dot" style="background:var(--col-human)"></span>
            HUMAN
        </div>
        <div class="ws-pill pill-face">
            <span class="pill-dot" style="background:var(--col-face)"></span>
            FACE
        </div>
        <div class="ws-pill pill-pose">
            <span class="pill-dot" style="background:var(--col-pose)"></span>
            POSE
        </div>
    </div>

    <div class="header-right">
        <div class="clock-pill">
            <span>⏱</span>
            <span id="clock">00 : 00 : 00</span>
        </div>
        <a href="select.html" class="home-btn" title="กลับหน้าตั้งค่า">
            <img src="image/class.png" alt="Home">
        </a>
    </div>
</header>

<!-- PAGE -->
<main class="page">
    <div class="page-inner">

        <!-- Page Title -->
        <div class="page-title-bar">
            <div class="page-title">📊 คะแนนสรุปผล</div>
            <div class="page-subtitle">ผลการวิเคราะห์และประเมินคะแนนรายบุคคล</div>
            <div class="meta-pills">
                <div class="meta-pill">🎮 <strong id="gameName">—</strong></div>
                <div class="meta-pill">🕹️ <strong id="playMethod">—</strong></div>
                <div class="meta-pill">🎯 <strong id="objective">—</strong></div>
                <div class="meta-pill">🕐 <strong id="timestamp">—</strong></div>
            </div>
        </div>

        <!-- Stats Card -->
        <div class="stats-card">
            <div class="stats-card-title">ภาพรวมผลลัพธ์</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-icon yellow">👥</div>
                    <div>
                        <div class="stat-title">ผู้เข้าร่วม</div>
                        <div class="stat-value" id="totalParticipants">0</div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon green">📈</div>
                    <div>
                        <div class="stat-title">คะแนนเฉลี่ย</div>
                        <div class="stat-value" id="averageScore">0</div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon purple">🏆</div>
                    <div>
                        <div class="stat-title">สูงสุด</div>
                        <div class="stat-value" id="maxScore">0</div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon blue">⬇️</div>
                    <div>
                        <div class="stat-title">ต่ำสุด</div>
                        <div class="stat-value" id="minScore">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Score Cards -->
        <div class="section-heading">
            <div class="section-heading-bar"></div>
            <div class="section-heading-text">ผลการประเมินรายบุคคล</div>
        </div>

        <div class="score-cards-grid" id="scoresContainer">
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <div class="empty-title">ยังไม่มีข้อมูล</div>
                <div class="empty-desc">กรุณากลับไปที่หน้าการตรวจจับเพื่อเริ่มวิเคราะห์</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-bar">
            <button class="btn btn-primary" onclick="exportPDF()">📥 ดาวน์โหลด PDF</button>
            <button class="btn btn-secondary" onclick="printPage()">🖨️ พิมพ์</button>
            <button class="btn btn-secondary" onclick="backToDetection()">← กลับไปตรวจจับ</button>
            <button class="btn btn-danger" onclick="clearData()">🗑️ ลบข้อมูล</button>
        </div>

    </div>
</main>

<script>
    // ======================================================
    // Clock
    // ======================================================
    const clockEl = document.getElementById('clock');
    function tick() {
        const t = new Date();
        const pad = n => String(n).padStart(2, '0');
        clockEl.textContent = `${pad(t.getHours())} : ${pad(t.getMinutes())} : ${pad(t.getSeconds())}`;
    }
    tick(); setInterval(tick, 1000);

    // ======================================================
    // Data Management
    // ======================================================
    const PLAY_LABEL = {
        sitting:  "นั่งเล่น",
        standing: "ยืนเล่น",
    };
    const OBJ_LABEL = {
        attention:   "ฝึกสมาธิและความนิ่ง",
        fine_motor:  "กล้ามเนื้อมัดเล็ก",
        gross_motor: "กล้ามเนื้อมัดใหญ่",
    };

    function getScoresData() {
        const dataStr = sessionStorage.getItem('sessionScores');
        if (!dataStr) return null;
        try { return JSON.parse(dataStr); } catch { return null; }
    }

    function getSessionParams() {
        return {
            playMethod: sessionStorage.getItem('playMethod') || 'standing',
            objective:  sessionStorage.getItem('objective')  || 'attention',
            gameName:   sessionStorage.getItem('gameName')   || 'Unknown Game',
        };
    }

    // ======================================================
    // Allowed participants
    // ======================================================
    const ALLOWED_NAMES = ['Ying', 'New', 'Tutor'];

    function filterAllowedData(data) {
        if (!data) return [];
        return data.filter(child =>
            ALLOWED_NAMES.some(name =>
                child.name.trim().toLowerCase() === name.toLowerCase()
            )
        );
    }

    // ======================================================
    // Render Dashboard
    // ======================================================
    function renderDashboard() {
        const rawData = getScoresData();
        const params  = getSessionParams();

        document.getElementById('gameName').textContent    = decodeURIComponent(params.gameName);
        document.getElementById('playMethod').textContent  = PLAY_LABEL[params.playMethod] || params.playMethod;
        document.getElementById('objective').textContent   = OBJ_LABEL[params.objective]   || params.objective;
        document.getElementById('timestamp').textContent   = new Date().toLocaleString('th-TH');

        // กรองเฉพาะข้อมูลของ Ying, New, Tutor
        const data = filterAllowedData(rawData);

        if (!rawData || rawData.length === 0) {
            document.getElementById('scoresContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div class="empty-title">ยังไม่มีข้อมูลคะแนน</div>
                    <div class="empty-desc">กรุณากลับไปที่หน้าการตรวจจับเพื่อเริ่มวิเคราะห์</div>
                </div>`;
            updateSummaryStats([]);
            return;
        }

        // ถ้าไม่มีข้อมูลของ Ying, New หรือ Tutor เลย → ไม่แสดง Dashboard
        if (data.length === 0) {
            document.getElementById('scoresContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🚫</div>
                    <div class="empty-title">ไม่พบข้อมูลที่ได้รับอนุญาต</div>
                    <div class="empty-desc">Dashboard จะแสดงผลเฉพาะข้อมูลของ Ying, New และ Tutor เท่านั้น</div>
                </div>`;
            updateSummaryStats([]);
            return;
        }

        const html = data.map((child) => {
            const avgScore = Math.round(
                (child.scores.attention + child.scores.fine_motor + child.scores.gross_motor) / 3
            );
            const initials = child.name.substring(0, 2).toUpperCase();

            return `
                <div class="score-card">
                    <div class="score-card-top">
                        <div class="score-card-header">
                            <div class="score-avatar" style="background:${child.color}">${initials}</div>
                            <div>
                                <div class="score-card-name">${escapeHtml(child.name)}</div>
                                <div class="score-card-id">ID: ${child.track_id}</div>
                            </div>
                        </div>
                        <div class="score-main-wrap">
                            <div class="score-main">${avgScore}</div>
                            <div class="score-main-label">คะแนนเฉลี่ย</div>
                        </div>
                    </div>
                    <div class="score-card-body">
                        <div class="breakdown-item">
                            <div class="breakdown-label-row">
                                <span class="breakdown-label-text">สมาธิและความนิ่ง</span>
                                <span class="breakdown-score">${child.scores.attention}</span>
                            </div>
                            <div class="breakdown-bar">
                                <div class="breakdown-fill fill-purple" style="width:${child.scores.attention}%"></div>
                            </div>
                        </div>
                        
                    </div>
                </div>`;
        }).join('');

        document.getElementById('scoresContainer').innerHTML = html;
        updateSummaryStats(data);  // ใช้ data ที่กรองแล้ว
    }

    function updateSummaryStats(data) {
        if (!data || data.length === 0) {
            ['totalParticipants','averageScore','maxScore','minScore']
                .forEach(id => document.getElementById(id).textContent = '0');
            return;
        }
        const scores = data.map(c =>
            Math.round((c.scores.attention + c.scores.fine_motor + c.scores.gross_motor) / 3)
        );
        document.getElementById('totalParticipants').textContent = data.length;
        document.getElementById('averageScore').textContent      = Math.round(scores.reduce((a,b) => a+b, 0) / scores.length);
        document.getElementById('maxScore').textContent          = Math.max(...scores);
        document.getElementById('minScore').textContent          = Math.min(...scores);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ======================================================
    // Export & Actions
    // ======================================================
    function exportPDF() {
        alert('PDF Export feature coming soon! (Requires jsPDF library)');
    }
    function printPage() { window.print(); }
    function clearData() {
        if (confirm('คุณแน่ใจหรือไม่ที่จะลบข้อมูลทั้งหมด?')) {
            ['sessionScores','playMethod','objective','gameName']
                .forEach(k => sessionStorage.removeItem(k));
            renderDashboard();
        }
    }
    function backToDetection() { window.location.href = 'index.html'; }

    // ======================================================
    // Init
    // ======================================================
    document.addEventListener('DOMContentLoaded', renderDashboard);
</script>
</body>
</html>
