<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NON | Setup Activity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f0e8;
  --white: #ffffff;
  --ink: #2d2a26;
  --ink-soft: #6b6560;
  --red: #e54e2e;
  --orange: #f4a020;
  --teal: #4dbf8a;
  --purple: #7b6ee8;
  --col-human: #4a7fc1;
  --col-face: #e05252;
  --col-pose: #4abf80;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

html, body {
  min-height: 100%;
  background: url('image/BG.png') no-repeat center center fixed;
  background-size: cover;
  font-family: 'Nunito', 'Sarabun', sans-serif;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  position: relative; z-index: 10;
  height: 72px;
  background: var(--white);
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 24px;
}

/* Logo avatar — slot for girl icon image */
.logo-avatar {
  width: 46px; height: 46px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: #f0ebe0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem;
  color: var(--ink-soft);
  text-align: center;
  line-height: 1.2;
  border: 2px solid #e0d9ce;
  cursor: pointer;
}
.logo-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.logo-avatar .placeholder-text { pointer-events: none; }

.header-title {
  font-size: 1.25rem;
  font-weight: 900;
  letter-spacing: 0.06em;
  color: var(--ink);
  text-transform: uppercase;
}

.ws-pills { display: flex; gap: 8px; }

.ws-pill {
  display: flex; align-items: center; gap: 6px;
  border-radius: 99px;
  padding: 5px 14px;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  border: 2px solid;
}
.pill-dot { width: 9px; height: 9px; border-radius: 50%; }
.pill-human { border-color: #4a7fc155; color: var(--col-human); background: #4a7fc110; }
.pill-face  { border-color: #e0525255; color: var(--col-face);  background: #e0525210; }
.pill-pose  { border-color: #4abf8055; color: var(--col-pose);  background: #4abf8010; }

.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 14px;
}

.clock-pill {
  display: flex; align-items: center; gap: 7px;
  border: 2px solid rgba(0,0,0,0.1);
  border-radius: 99px;
  padding: 5px 14px;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  background: var(--bg);
}

/* Home button — slot for house image */
.home-btn {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: var(--bg);
  border: 2px solid rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
  overflow: hidden;
  color: var(--ink-soft);
  font-size: 0.55rem;
  text-align: center;
  line-height: 1.3;
}
.home-btn:hover { background: #ebe4d8; }
.home-btn img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

/* ===== PAGE ===== */
.page {
  position: relative; z-index: 1;
  display: flex; justify-content: center;
  padding: 40px 20px 80px;
  min-height: calc(100vh - 72px);
}

/* ===== CARD ===== */
.card {
  width: 100%; max-width: 880px;
  background: var(--white);
  border-radius: 28px;
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: card-in 0.5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(24px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card-header { padding: 28px 32px 10px; }

.card-title {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--purple);
  font-family: 'Nunito', sans-serif;
}
.card-subtitle {
  font-size: 0.92rem;
  color: var(--ink-soft);
  margin-top: 2px;
  font-family: 'Sarabun', sans-serif;
  font-weight: 600;
}

.card-body { padding: 10px 32px 0; }

/* ===== FORM ROWS ===== */
.form-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1.5px solid #f0ebe2;
  animation: row-in 0.4s cubic-bezier(.22,1,.36,1) both;
}
.form-row:last-child { border-bottom: none; }
.form-row:nth-child(1) { animation-delay: 0.08s; }
.form-row:nth-child(2) { animation-delay: 0.15s; }
.form-row:nth-child(3) { animation-delay: 0.22s; }
@keyframes row-in {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Number badge */
.num-badge {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  font-weight: 900;
  color: white;
  flex-shrink: 0;
}
.num-badge.red    { background: var(--red); }
.num-badge.orange { background: var(--orange); }
.num-badge.teal   { background: var(--teal); }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }

.chip {
  font-family: 'Sarabun', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: 99px;
  border: 2px solid #e0d9ce;
  background: white;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(.22,1,.36,1);
  white-space: nowrap;
  user-select: none;
}
.chip:hover { border-color: #c8bfb0; color: var(--ink); transform: translateY(-1px); }

.chip.active {
  color: white;
  border-color: transparent;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}
/* Row 1 — red */
.chip.red.active  { background: var(--red); }
/* Row 2 — all chips use orange (same as badge) */
.chip.obj.active  { background: var(--orange); }
/* Row 3 — teal */
.chip.teal.active { background: var(--teal); }

/* Custom game input */
.custom-input-wrap { margin-top: 8px; margin-left: 60px; }
.custom-input {
  font-family: 'Sarabun', sans-serif;
  font-size: 0.9rem;
  padding: 8px 16px;
  border: 2px solid #e0d9ce;
  border-radius: 12px;
  outline: none;
  width: 100%;
  max-width: 340px;
  color: var(--ink);
  transition: border-color 0.2s;
}
.custom-input:focus { border-color: var(--teal); }
.custom-input.hidden { display: none; }

/* ===== SUMMARY BAR ===== */
.summary-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 20px 32px;
  background: #faf7f2;
  border-top: 1.5px solid #f0ebe2;
  margin-top: 8px;
}
.sum-item {
  flex: 1 1 160px;
  background: white;
  border-radius: 16px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  min-width: 140px;
}
.sum-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.15rem;
  flex-shrink: 0;
}
.sum-icon.yellow { background: #fff3d4; }
.sum-icon.green  { background: #d4f5e8; }
.sum-icon.purple { background: #ede8ff; }
.sum-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: 'Nunito', sans-serif;
}
.sum-val {
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--ink);
  margin-top: 1px;
  font-family: 'Nunito', sans-serif;
}

/* ===== FOOTER ===== */
.card-footer { padding: 0 32px 28px; }

.btn-start {
  width: 100%;
  background: linear-gradient(135deg, #7b6ee8 0%, #5a4dcf 100%);
  color: white;
  border: none;
  border-radius: 16px;
  padding: 16px 24px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 6px 20px rgba(123,110,232,0.4);
  transition: transform 0.18s, box-shadow 0.18s;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(123,110,232,0.45); }
.btn-start:active { transform: scale(0.99); }
.btn-arrow { font-size: 1.2rem; transition: transform 0.2s; }
.btn-start:hover .btn-arrow { transform: translateX(4px); }

@media (max-width: 600px) {
  .card-header, .card-body, .card-footer { padding-left: 20px; padding-right: 20px; }
  .summary-bar { padding: 16px 20px; }
  .ws-pills { display: none; }
  .card-title { font-size: 1.5rem; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">

  <!-- Girl icon — replace src with your image URL -->
  <div class="logo-avatar" title="คลิกเพื่อเปลี่ยนรูป" onclick="document.getElementById('girlImgInput').click()">
    <img id="girlImg" src="image/logo.png" alt="" style="display:block">
    <input type="file" id="girlImgInput" accept="image/*" style="display:none">
  </div>

  <div class="header-title">NON-Autos&nbsp;Mine</div>

  <div class="ws-pills">
    <div class="ws-pill pill-human">
      <span class="pill-dot" style="background:var(--col-human)"></span>
      HUMAN
    </div>
    <div class="ws-pill pill-face">
      <span class="pill-dot" style="background:var(--col-face)"></span>
      FACE
    </div>
    <div class="ws-pill pill-pose">
      <span class="pill-dot" style="background:var(--col-pose)"></span>
      POSE
    </div>
  </div>

  <div class="header-right">
    <div class="clock-pill">
      <span>⏱</span>
      <span id="clock">00 : 00 : 00</span>
    </div>

    <!-- Home icon — replace src with your image URL -->
    <a href="#" class="home-btn" title="Home" onclick="document.getElementById('houseImgInput').click(); return false;">
      <img id="houseImg" src="image/class.png" alt="Home" style="display:block">
      <input type="file" id="houseImgInput" accept="image/*" style="display:none">
    </a>
  </div>
</header>

<!-- PAGE -->
<main class="page">
  <div class="card">

    <div class="card-header">
      <div class="card-title">Setup Activity</div>
      <div class="card-subtitle">ตั้งค่าก่อนเริ่มประมวลผล AI</div>
    </div>

    <form id="setupForm" action="index.html" method="GET">
      <input type="hidden" id="hPlayMethod" name="playMethod" value="standing">
      <input type="hidden" id="hObjective"  name="objective"  value="attention">
      <input type="hidden" id="hGameName"   name="gameName"   value="เกมลากเส้นตามรอยประ">

      <div class="card-body">

        <!-- Row 1: วิธีเล่น (red) -->
        <div class="form-row">
          <div class="num-badge red">1</div>
          <div class="chips" id="chips-play">
            <button type="button" class="chip red active" data-val="standing">ยืนเล่น · Standing</button>
            <button type="button" class="chip red" data-val="sitting">นั่งเล่น · Sitting</button>
          </div>
        </div>

        <!-- Row 2: วัตถุประสงค์ (orange — same as badge) -->
        <div class="form-row">
          <div class="num-badge orange">2</div>
          <div class="chips" id="chips-obj">
            <button type="button" class="chip obj active" data-val="attention">ฝึกสมาธิ · Attention</button>
            <button type="button" class="chip obj" data-val="fine_motor">กล้ามเนื้อมัดเล็ก · Fine Motor</button>
            <button type="button" class="chip obj" data-val="gross_motor">กล้ามเนื้อมัดใหญ่ · Gross Motor</button>
          </div>
        </div>

        <!-- Row 3: ชื่อเกม (teal) -->
        <div class="form-row" style="flex-wrap:wrap">
          <div class="num-badge teal">3</div>
          <div class="chips" id="chips-game">
            <button type="button" class="chip teal active" data-val="เกมลากเส้นตามรอยประ">เกมลากเส้นตามรอยประ</button>
            <button type="button" class="chip teal" data-val="เกมแปรงฟัน">เกมแปรงฟัน</button>
            <button type="button" class="chip teal" data-val="custom">อื่นๆ…</button>
          </div>
          <div class="custom-input-wrap" style="width:100%">
            <input type="text" class="custom-input hidden" id="gameNameCustom"
              placeholder="ระบุชื่อเกมที่ต้องการ…">
          </div>
        </div>

      </div>

      <!-- Summary bar -->
      <div class="summary-bar">
        <div class="sum-item">
          <div class="sum-icon yellow">🕹️</div>
          <div>
            <div class="sum-label">การเล่น</div>
            <div class="sum-val" id="sumPlay">ยืนเล่น</div>
          </div>
        </div>
        <div class="sum-item">
          <div class="sum-icon green">🎯</div>
          <div>
            <div class="sum-label">วัตถุประสงค์</div>
            <div class="sum-val" id="sumObj">ฝึกสมาธิ</div>
          </div>
        </div>
        <div class="sum-item">
          <div class="sum-icon purple">🎮</div>
          <div>
            <div class="sum-label">ชื่อเกม</div>
            <div class="sum-val" id="sumGame">เกมลากเส้นตามรอยประ</div>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <button type="submit" class="btn-start">
          <span>เริ่มกิจกรรม &amp; ประมวลผล AI</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
    </form>
  </div>
</main>

<script>
// ---- Clock ----
const clockEl = document.getElementById('clock');
function tick() {
  const t = new Date();
  const pad = n => String(n).padStart(2,'0');
  clockEl.textContent = `${pad(t.getHours())} : ${pad(t.getMinutes())} : ${pad(t.getSeconds())}`;
}
tick(); setInterval(tick, 1000);

// ---- Image upload helpers ----
function bindImageSlot(inputId, imgId, placeholderId) {
  const input = document.getElementById(inputId);
  const img   = document.getElementById(imgId);
  const ph    = document.getElementById(placeholderId);
  input.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    img.src = url;
    img.style.display = 'block';
    if (ph) ph.style.display = 'none';
  });
}
bindImageSlot('girlImgInput',  'girlImg',  'girlPlaceholder');
bindImageSlot('houseImgInput', 'houseImg', 'housePlaceholder');

// ---- Chip groups ----
const playLabels = { standing: 'ยืนเล่น', sitting: 'นั่งเล่น' };
const objLabels  = { attention: 'ฝึกสมาธิ', fine_motor: 'กล้ามเนื้อมัดเล็ก', gross_motor: 'กล้ามเนื้อมัดใหญ่' };

function setupChips(groupId, hiddenId, sumId, labelMap) {
  const grp = document.getElementById(groupId);
  const hid = document.getElementById(hiddenId);
  const sum = document.getElementById(sumId);
  grp.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      grp.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      const v = btn.dataset.val;
      hid.value = v;
      if (sum && labelMap) sum.textContent = labelMap[v] || btn.textContent.split('·')[0].trim();
    });
  });
}
setupChips('chips-play', 'hPlayMethod', 'sumPlay', playLabels);
setupChips('chips-obj',  'hObjective',  'sumObj',  objLabels);

// ---- Game chips ----
const gameGrp = document.getElementById('chips-game');
const hGame   = document.getElementById('hGameName');
const sumGame = document.getElementById('sumGame');
const custInp = document.getElementById('gameNameCustom');

gameGrp.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    gameGrp.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.val;
    if (v === 'custom') {
      custInp.classList.remove('hidden');
      custInp.focus();
      hGame.value = '';
      sumGame.textContent = '—';
    } else {
      custInp.classList.add('hidden');
      hGame.value = v;
      sumGame.textContent = v;
    }
  });
});

custInp.addEventListener('input', () => {
  hGame.value = custInp.value.trim();
  sumGame.textContent = custInp.value.trim() || '—';
});

// ---- Validate ----
document.getElementById('setupForm').addEventListener('submit', e => {
  const active = gameGrp.querySelector('.chip.active');
  if (active?.dataset.val === 'custom' && !custInp.value.trim()) {
    e.preventDefault();
    custInp.style.borderColor = '#e54e2e';
    custInp.focus();
    setTimeout(() => custInp.style.borderColor = '', 1800);
  }
});
</script>
</body>
</html>
