<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NON | Setup Activity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sans: 'Roboto', 'Lato', sans-serif;
            --mono: 'Courier New', monospace;

            --bg:       #f2efe9;
            --surface:  #ede9e1;
            --surface2: #e5e0d6;

            --ink:    #000000;
            --ink-2:  #000000;
            --ink-3:  #1d1d1d;

            --border:   rgba(26,24,20,0.18);
            --border-s: rgba(26,24,20,0.10);

            --col-human: #0b6fb8;
            --col-face:  #b12f12;
            --col-pose:  #148a4f;

            --red:  #d94040;
            --warn: #c97a1a;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- HEADER ---- */
        .header {
            height: 80px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
        }

        .header-title {
            font-family: var(--mono);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--ink);
            text-transform: uppercase;
        }

        .header-time {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 0.9rem;
            color: var(--ink-3);
            letter-spacing: 0.06em;
        }

        .ws-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 5px 10px;
            font-family: var(--mono);
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: var(--ink-3);
        }

        .pill-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ---- PAGE LAYOUT ---- */
        .page {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: calc(100vh - 44px);
            padding: 40px 20px 60px;
        }

        /* ---- CARD ---- */
        .card {
            width: 100%;
            max-width: 950px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            animation: card-in 0.42s cubic-bezier(.4,0,.2,1) both;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Card header bar */
        .card-header {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        

        .card-header-text { flex: 1; }

        .card-title {
            font-family: var(--mono);
            font-size: 1.5rem;
            font-weight: 1000;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .card-subtitle {
            font-family: var(--mono);
            font-size: 0.9rem;
            color: var(--ink-3);
            letter-spacing: 0.02em;
            margin-top: 10px;
            
        }


        /* ---- FORM BODY ---- */
        .card-body {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ---- FORM GROUP ---- */
        .form-group {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-s);
            animation: item-in 0.35s cubic-bezier(.4,0,.2,1) both;
        }

        .form-group:nth-child(1) { animation-delay: 0.06s; }
        .form-group:nth-child(2) { animation-delay: 0.12s; }
        .form-group:nth-child(3) { animation-delay: 0.18s; }

        @keyframes item-in {
            from { opacity: 0; transform: translateX(-10px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .form-group:last-of-type { border-bottom: none; }

        .form-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
        }

        .form-index {
            font-family: var(--mono);
            font-size: 1.4rem;
            color: var(--ink-3);
            letter-spacing: 0.08em;
            min-width: 16px;
            padding-top: 1px;
        }

        .form-label {
            font-family: var(--mono);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--ink);
            text-transform: uppercase;
        }

        /* ---- CHIP GROUP (replaces boring <select>) ---- */
        .chip-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding-left: 45px;
        }

        .chip-opt {
            font-family: var(--mono);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            padding: 5px 14px;
            border: 1px solid var(--border);
            border-radius: 99px;
            background: transparent;
            color: var(--ink-3);
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s, color 0.18s;
            user-select: none;
        }

        .chip-opt:hover {
            background: var(--surface2);
            border-color: rgba(26,24,20,0.3);
            color: var(--ink);
        }

        .chip-opt.active {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--bg);
        }

        /* color-coded chips for objective */
        .chip-opt[data-color="human"].active  { background: var(--col-human); border-color: var(--col-human); }
        .chip-opt[data-color="face"].active   { background: var(--col-face);  border-color: var(--col-face); }
        .chip-opt[data-color="pose"].active   { background: var(--col-pose);  border-color: var(--col-pose); }

        /* Hidden native inputs (values passed via form) */
        .hidden { display: none; }

        /* ---- Game name (text input) ---- */
        .game-input-wrap {
            padding-left: 28px;
            margin-top: 6px;
        }

        .game-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 7px 12px;
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--ink);
            letter-spacing: 0.04em;
            outline: none;
            transition: border-color 0.2s;
        }

        .game-input::placeholder { color: var(--ink-3); }

        .game-input:focus {
            border-color: rgba(26,24,20,0.45);
        }

        .game-input.hidden { display: none; }

        /* ---- SUMMARY BAR ---- */
        .summary-bar {
            background: rgba(245, 241, 236, 0.95);
            border: 1px solid rgba(26,24,20,0.12);
            border-radius: 14px;
            padding: 18px 22px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin: 0 auto 18px;
            max-width: 760px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 18px;
            border-radius: 12px;
            background: rgba(255,255,255,0.88);
            box-shadow: inset 0 0 0 1px rgba(26,24,20,0.05);
            flex: 1 1 160px;
            min-width: 140px;
            text-align: center;
        }

        .summary-key {
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--ink-3);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
            line-height: 1.2;
            margin: 0;
        }

        .summary-val {
            font-family: var(--mono);
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.02em;
            margin: 0;
        }

        /* ---- SUBMIT BUTTON ---- */
        .card-footer {
            padding: 16px 20px 20px;
        }

        .btn-submit {
            width: 100%;
            background: var(--ink);
            color: var(--bg);
            border: none;
            border-radius: 2px;
            padding: 12px 20px;
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.18s, transform 0.15s;
        }

        .btn-submit:hover { opacity: 0.85; }
        .btn-submit:active { transform: scale(0.99); }

        .btn-arrow {
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .btn-submit:hover .btn-arrow { transform: translateX(4px); }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 560px) {
            .page { padding: 20px 12px 40px; }
            .card-body { padding: 16px 14px; }
        }
    </style>
</head>
<body>

<!-- HEADER — matches index.html -->
<header class="header">
    <div class="header-title">NON-Autos&nbsp;Mine</div>

    <div class="ws-pill" style="border-color:rgba(0,128,255,0.3)">
        <span class="pill-dot" style="background:#0080ff"></span>
        <span style="color:#0080ff">HUMAN</span>
    </div>
    <div class="ws-pill" style="border-color:rgba(255,64,129,0.3)">
        <span class="pill-dot" style="background:#ff4081"></span>
        <span style="color:rgba(255,64,129,0.8)">FACE</span>
    </div>
    <div class="ws-pill" style="border-color:rgb(32,177,0)">
        <span class="pill-dot" style="background:rgb(32,177,0)"></span>
        <span style="color:rgb(32,177,0)">POSE</span>
    </div>

    <div class="header-time" id="clock">00:00:00</div>
</header>

<!-- PAGE -->
<main class="page">
    <div class="card">

        <!-- Card Header -->
        <div class="card-header">
            <div class="card-header-text">
                <div class="card-title">Setup&nbsp;Activity</div>
                <div class="card-subtitle">ตั้งค่าก่อนเริ่มประมวลผล&nbsp;AI</div>
            </div>
           
        </div>

        <!-- Hidden actual form inputs — updated by JS -->
        <form id="setupForm" action="index.html" method="GET">
            <input type="hidden" name="playMethod" id="hPlayMethod" value="sitting">
            <input type="hidden" name="objective"  id="hObjective"  value="attention">
            <input type="hidden" name="gameName"   id="hGameName"   value="เกมแปรงฟัน">

            <!-- FORM BODY -->
            <div class="card-body">

                <!-- 01: วิธีที่เล่นเกม -->
                <div class="form-group">
                    <div class="form-row">
                        <span class="form-index">1)</span>
                        <label class="form-label">วิธีที่ใช้เล่นเกม</label>
                    </div>
                    <div class="chip-group" id="chips-play">
                        <button type="button" class="chip-opt active" data-val="sitting">นั่งเล่น&ensp;·&ensp;Sitting</button>
                        <button type="button" class="chip-opt" data-val="standing">ยืนเล่น&ensp;·&ensp;Standing</button>
                    </div>
                </div>

                <!-- 02: วัตถุประสงค์ -->
                <div class="form-group">
                    <div class="form-row">
                        <span class="form-index">2)</span>
                        <label class="form-label">วัตถุประสงค์ของเกม</label>
                    </div>
                    <div class="chip-group" id="chips-obj">
                        <button type="button" class="chip-opt active" data-val="attention" data-color="human">ฝึกสมาธิ&ensp;·&ensp;Attention</button>
                        <button type="button" class="chip-opt" data-val="fine_motor" data-color="face">กล้ามเนื้อมัดเล็ก&ensp;·&ensp;Fine Motor</button>
                        <button type="button" class="chip-opt" data-val="gross_motor" data-color="pose">กล้ามเนื้อมัดใหญ่&ensp;·&ensp;Gross Motor</button>
                    </div>
                </div>

                <!-- 03: ชื่อเกม -->
                <div class="form-group">
                    <div class="form-row">
                        <span class="form-index">3)</span>
                        <label class="form-label">ชื่อเกม</label>
                    </div>
                    <div class="chip-group" id="chips-game">
                        <button type="button" class="chip-opt active" data-val="เกมแปรงฟัน">เกมแปรงฟัน</button>
                        <button type="button" class="chip-opt" data-val="เกมลากเส้น">เกมลากเส้นตามรอยประ</button>
                        <button type="button" class="chip-opt" data-val="custom">อื่นๆ…</button>
                    </div>
                    <div class="game-input-wrap" id="customWrap">
                        <input type="text" class="game-input hidden" id="gameNameCustom"
                               placeholder="ระบุชื่อเกมที่ต้องการ…">
                    </div>
                </div>

            </div><!-- /card-body -->

            <!-- SUMMARY BAR -->
            <div class="summary-bar">
                <div class="summary-item">
                    <span class="summary-key">การเล่น</span>
                    <span class="summary-val" id="sumPlay">นั่งเล่น</span>
                </div>
                <div class="summary-item">
                    <span class="summary-key">วัตถุประสงค์</span>
                    <span class="summary-val" id="sumObj">ฝึกสมาธิ</span>
                </div>
                <div class="summary-item">
                    <span class="summary-key">ชื่อเกม</span>
                    <span class="summary-val" id="sumGame">เกมแปรงฟัน</span>
                </div>
            </div>

            <!-- FOOTER / SUBMIT -->
            <div class="card-footer">
                <button type="submit" class="btn-submit">
                    <span>เริ่มกิจกรรม&nbsp;&&nbsp;ประมวลผล&nbsp;AI</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>

        </form>
    </div>
</main>

<script>
    // ---- Clock ----
    function tick() {
        document.getElementById("clock").textContent =
            new Date().toLocaleTimeString("th-TH", { hour12: false });
    }
    tick();
    setInterval(tick, 1000);

    // ---- Chip groups ----
    const playLabels = { sitting: "นั่งเล่น", standing: "ยืนเล่น" };
    const objLabels  = { attention: "ฝึกสมาธิ", fine_motor: "กล้ามเนื้อมัดเล็ก", gross_motor: "กล้ามเนื้อมัดใหญ่" };

    function setupChips(groupId, hiddenId, summaryId, labelMap) {
        const group   = document.getElementById(groupId);
        const hidden  = document.getElementById(hiddenId);
        const summary = document.getElementById(summaryId);
        if (!group) return;

        group.querySelectorAll(".chip-opt").forEach(btn => {
            btn.addEventListener("click", () => {
                group.querySelectorAll(".chip-opt").forEach(c => c.classList.remove("active"));
                btn.classList.add("active");
                const val = btn.dataset.val;
                hidden.value = val;
                if (summary && labelMap) {
                    summary.textContent = labelMap[val] || btn.textContent.split("·")[0].trim();
                }
            });
        });
    }

    setupChips("chips-play", "hPlayMethod", "sumPlay", playLabels);
    setupChips("chips-obj",  "hObjective",  "sumObj",  objLabels);

    // ---- Game name chips (special: custom input) ----
    const gameChips    = document.getElementById("chips-game");
    const hGameName    = document.getElementById("hGameName");
    const sumGame      = document.getElementById("sumGame");
    const customInput  = document.getElementById("gameNameCustom");

    gameChips.querySelectorAll(".chip-opt").forEach(btn => {
        btn.addEventListener("click", () => {
            gameChips.querySelectorAll(".chip-opt").forEach(c => c.classList.remove("active"));
            btn.classList.add("active");
            const val = btn.dataset.val;
            if (val === "custom") {
                customInput.classList.remove("hidden");
                customInput.focus();
                hGameName.value = "";
                sumGame.textContent = "—";
            } else {
                customInput.classList.add("hidden");
                hGameName.value = val;
                sumGame.textContent = val;
            }
        });
    });

    customInput.addEventListener("input", () => {
        hGameName.value = customInput.value.trim();
        sumGame.textContent = customInput.value.trim() || "—";
    });

    // ---- Validate before submit ----
    document.getElementById("setupForm").addEventListener("submit", e => {
        const gameActive = gameChips.querySelector(".chip-opt.active");
        if (gameActive && gameActive.dataset.val === "custom" && !customInput.value.trim()) {
            e.preventDefault();
            customInput.style.borderColor = "var(--red)";
            customInput.focus();
            setTimeout(() => customInput.style.borderColor = "", 1800);
        }
    });
</script>
</body>
</html>
